  - provider: GitHub
    name: Ambermoon.net-Windows
    artifact: Ambermoon.net-Windows
    tag: $(VERSION_TAG)
    release: $(VERSION_TAG)
    description: 'Release $(VERSION_TAG)'
    auth_token:
